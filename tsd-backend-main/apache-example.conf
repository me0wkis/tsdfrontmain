# Конфигурация Apache для TSD Portal
# Путь на сервере: /etc/apache2/sites-enabled/tsd-portal.conf
#
# Структура:
#   /auth/*   → Django (ADFS login/callback/logout)
#   /api/*    → Django (REST API)
#   всё остальное → Angular SPA (index.html)
#
# Требуемые модули:
#   a2enmod proxy proxy_http rewrite headers ssl

# ─────────────────────────────────────────────────────────────────
#  HTTP → HTTPS редирект
# ─────────────────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName poc-tsdportal.it.slb.ru
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ─────────────────────────────────────────────────────────────────
#  HTTPS — основной блок
# ─────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName poc-tsdportal.it.slb.ru

    # SSL
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/itslbru_2026_10_01.crt
    SSLCertificateKeyFile /etc/ssl/private/itslbru_2026_10_01.key

    # Корень Angular SPA
    DocumentRoot /var/www/tsdp-frontend

    # Логи
    ErrorLog  ${APACHE_LOG_DIR}/poc-tsdportal-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/poc-tsdportal-ssl-access.log combined

    # ── Reverse proxy на Django (gunicorn :3000) ──────────────────
    ProxyPreserveHost On
    ProxyRequests     Off
    ProxyTimeout      60

    # Передаём реальный протокол/порт в Django
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # ADFS: /auth/login → Django, /auth/callback → Django, /auth/logout → Django
    ProxyPass        /auth/ http://127.0.0.1:3000/auth/
    ProxyPassReverse /auth/ http://127.0.0.1:3000/auth/

    # REST API
    ProxyPass        /api/ http://127.0.0.1:3000/api/
    ProxyPassReverse /api/ http://127.0.0.1:3000/api/

    # ── Angular SPA ───────────────────────────────────────────────
    # Все маршруты кроме /auth/ и /api/ отдаём Angular.
    # RewriteRule внутри Directory не мешает ProxyPass выше —
    # ProxyPass обрабатываются раньше, до Directory.
    <Directory /var/www/tsdp-frontend>
        Require all granted
        Options -Indexes

        RewriteEngine On

        # Реальные файлы (*.js, *.css, *.ico, assets/) — отдаём напрямую
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [L]

        # Всё остальное (/login, /schedule, /management, ...) → index.html
        # Angular Router сам разберётся с маршрутом
        RewriteRule ^ index.html [L]
    </Directory>

</VirtualHost>
