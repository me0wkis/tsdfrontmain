openapi: 3.0.3
info:
  title: TSD Backend API
  version: 0.0.1
  description: API documentation for the TSD Backend.
paths:
  /api/portal/auth/ldap/:
    post:
      operationId: auth_ldap_create
      description: |-
        Аутентификация через корпоративный Active Directory (LDAPS).

        Требования:
        - Пользователь должен быть заведён в таблице `users` (поле `alias`).
        - Пароль проверяется напрямую в AD (direct user bind).

        При успехе устанавливает cookie `session_token`, который используется всеми остальными эндпоинтами.
      summary: LDAP login (AD)
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                  example: ivanov
                password:
                  type: string
                  example: secret
      security:
      - basicAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Authenticated — session_token cookie выставлен
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Не указан username или password
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Неверные учётные данные или пользователь не найден в
                  БД
          description: ''
  /api/portal/auth/login/:
    post:
      operationId: auth_login_create
      description: '[LEGACY] JWT авторизация по email. Не используется — текущая авторизация
        через ADFS (/auth/login).'
      summary: User login
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  example: user@company.com
                password:
                  type: string
                  example: any_value
