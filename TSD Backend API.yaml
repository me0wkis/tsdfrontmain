  /api/portal/shifts/:
    get:
      operationId: shifts_list
      description: "\n        ## Advanced Filtering System\n\n        Use the `filter`\
        \ parameter with format: **field-operator-value**\n\n        ### Examples:\n\
        \        - `filter=user-eq-IIvanov` - User equals IIvanov\n        - `filter=shift_type-eq-1`\
        \ - Shift type equals 1\n        - `filter=shift_date-gt-2025-01-01` - Shift\
        \ date after 2025-01-01\n\n        ### Multiple Filters:\n        Add multiple\
        \ `filter` parameters:\n        `filter=user-eq-IIvanov&filter=shift_type-eq-1`\n\
        \n        ### Available Operators:\n        | Operator | Description | Example\
        \ |\n        |----------|-------------|---------|\n        | `eq` | Equals\
        \ | `user-eq-IIvanov` |\n        | `ne` | Not equals | `shift_type-ne-1` |\n\
        \        | `gt` | Greater than | `shift_date-gt-2024-01-01` |\n        | `lt`\
        \ | Less than | `shift_date-lt-2025-01-01` |\n        | `contains` | Contains\
        \ | `job_title-contains-live` |\n\n        ### Available Fields:\n       \
        \ - `user`, `shift_date`, `shift_type`\n        - `job_title`, `shift_template`\n\
        \        - `start_time`, `created_by`\n                "
      summary: Get list of shifts with advanced filtering
      parameters:
      - in: query
        name: filter
        schema:
          type: string
        description: "\n        Filter parameters in format: field-operator-value\n\
          \n        **Examples:**\n        - filter=user-eq-IIvanov\n        - filter=shift_type-eq-1\n\
          \        - filter=shift_date-gt-2025-01-01\n\n        **Multiple filters:**\
          \ Use multiple filter parameters\n                        "
        explode: true
        style: form
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results per page
      - in: query
        name: offset
        schema:
          type: integer
        description: Pagination offset
      - in: query
        name: sort
        schema:
          type: string
        description: 'Sort parameters in format: field-order (asc/desc)'
        explode: true
        style: form
      tags:
      - shifts
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedShiftsReadList'
          description: ''
    post:
      operationId: shifts_create
      tags:
      - shifts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftsWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ShiftsWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ShiftsWriteRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftsWrite'
          description: ''
