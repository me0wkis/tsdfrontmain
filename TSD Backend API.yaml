  /api/portal/sync-employees/:
    get:
      operationId: sync_employees_retrieve
      description: "\n            Переносит данные из исходной таблицы в целевую с\
        \ подстановкой названий должностей вместо ID.\n\n            **Как это работает:**\n\
        \            1. Фильтрация записей по указанным категориям\n            2.\
        \ Проверка существования записи в целевой таблице\n            3. Добавление\
        \ только новых записей\n            4. Подстановка названия должности вместо\
        \ ID\n\n            **Примеры использования:**\n            - `/api/sync-employees/?category_ids=1,2,3`\
        \ - синхронизация категорий 1,2,3\n            - `/api/sync-employees/?category_names=Manager,Developer&dry_run=true`\
        \ - тестовый прогон\n            - `/api/sync-employees/?source_ids=101,102,103&include_without_category=true`\
        \ - конкретные ID\n            "
      summary: Синхронизировать данные сотрудников
      parameters:
      - in: query
        name: batch_size
        schema:
          type: integer
          default: 1000
        description: Размер пакета для массовой вставки (макс. 10000)
        examples:
          Пример:
            value: '500'
            description: Вставлять по 500 записей за раз
      - in: query
        name: category_ids
        schema:
          type: string
        description: 'ID категорий через запятую (например: 1,2,3)'
        examples:
          Пример1:
            value: 1,2,3
            summary: Пример 1
            description: Синхронизация категорий 1, 2 и 3
          Пример2:
            value: 5,7,10
            summary: Пример 2
            description: Синхронизация категорий 5, 7 и 10
      - in: query
        name: category_names
        schema:
          type: string
        description: 'Названия категорий через запятую (например: Manager,Developer)'
        examples:
          Пример1:
            value: Manager,Developer
            summary: Пример 1
            description: Синхронизация категорий с названиями Manager и Developer
      - in: query
        name: dry_run
        schema:
          type: boolean
          default: false
        description: Только подсчет без реальной вставки (для проверки)
        examples:
          Пример:
            value: 'true'
            description: Тестовый прогон без изменений в БД
      - in: query
        name: format
        schema:
          type: string
          enum:
          - csv
          - json
          default: json
        description: Формат ответа (json или csv)
      - in: query
        name: include_without_category
        schema:
          type: boolean
          default: false
        description: Включать пользователей без категории (usercategories_id IS NULL)
        examples:
          Пример:
            value: 'true'
            description: Включить пользователей без категории
      - in: query
        name: source_ids
        schema:
          type: string
        description: ID записей для синхронизации через запятую
        examples:
          Пример:
            value: 101,102,103
            description: Синхронизация только записей с ID 101, 102 и 103
      tags:
      - Analytics sync
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                УспешныйОтвет:
                  value:
                    status: success
                    message: Sync completed successfully
                    statistics:
                      processed: 150
                      new: 45
                      skipped: 105
                      errors: 0
                    applied_filters:
                      category_ids:
                      - 1
                      - 2
                      - 3
                      include_without_category: false
                  summary: Успешный ответ
                ТестовыйПрогон:
                  value:
                    status: success
                    message: Dry run completed
                    statistics:
                      processed: 150
                      new: 45
                      skipped: 105
                      errors: 0
                      details:
                      - id: 101
                        action: will_create
                        category_id: 1
                      - id: 102
                        action: skipped
                        reason: already_exists
                        category_id: 2
                    applied_filters:
                      category_ids:
                      - 1
                      - 2
                      - 3
                  summary: Тестовый прогон
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
