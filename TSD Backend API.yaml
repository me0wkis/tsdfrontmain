      - basicAuth: []
      - cookieAuth: []
      - {}
      deprecated: true
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Success
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Bad Request
          description: ''
  /api/portal/auth/logout/:
    post:
