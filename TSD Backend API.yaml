  /api/portal/users/:
    get:
      operationId: users_list
      description: "\n    ## Advanced Filtering System\n\n    Use the `filter` parameter\
        \ with format: **field-operator-value**\n\n    ### Examples:\n    - `filter=first_name-eq-John`\
        \ - First name equals \"John\"\n    - `filter=is_active-eq-1` - Is active\
        \ equals 1\n    - `filter=hiring_date-gt-2023-01-01` - Hiring date after 2023-01-01\n\
        \n    ### Multiple Filters:\n    Add multiple `filter` parameters:\n    `filter=first_name-eq-John&filter=is_active-eq-1&filter=hiring_date-gt-2023-01-01`\n\
        \n    ### Available Operators:\n    | Operator | Description | Example |\n\
        \    |----------|-------------|---------|\n    | `eq` | Equals | `first_name-eq-John`\
        \ |\n    | `ne` | Not equals | `is_active-ne-0` |\n    | `gt` | Greater than\
        \ | `hiring_date-gt-2023-01-01` |\n    | `lt` | Less than | `hiring_date-lt-2024-01-01`\
        \ |\n    | `contains` | Contains | `job_title-contains-manager` |\n\n    ###\
        \ Available Fields:\n    - `first_name`, `second_name`, `alias`, `email`\n\
        \    - `job_title`, `is_active`, `hiring_date`, `group_name`\n    - `supervisor_name`,\
        \ `team__name`, `desk__number`\n            "
      summary: Get list of users with advanced filtering
      parameters:
      - in: query
        name: filter
        schema:
          type: string
        description: "\n    Filter parameters in format: field-operator-value\n\n\
          \    **Examples:**\n    - first_name-eq-John\n    - is_active-eq-1\n   \
          \ - hiring_date-gt-2023-01-01\n\n    **Multiple filters:** Use multiple\
          \ filter parameters\n    \n    **Note:** Use `__` for related fields, not\
          \ single `_`\n                    "
        explode: true
        style: form
      - in: query
        name: limit
        schema:
          type: integer
        description: Number of results per page
      - in: query
        name: offset
        schema:
          type: integer
        description: Pagination offset
      - in: query
        name: sort
        schema:
          type: string
        description: 'Sort parameters in format: field-order (asc/desc)'
        explode: true
        style: form
      tags:
      - users
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
