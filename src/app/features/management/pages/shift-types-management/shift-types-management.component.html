<div class="p-6">
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-900">Управление типами смен</h2>
    <p class="mt-2 text-gray-600">
      Создание, редактирование и удаление типов смен
    </p>
  </div>

  <!-- Toolbar -->
  <p-toolbar class="p-2 mb-4">
    <div class="p-toolbar-group-start">
      <button
        pButton
        pRipple
        label="Добавить"
        icon="pi pi-plus"
        class="mr-2 p-button-success"
        (click)="openNew()"
      ></button>
      <button
        pButton
        pRipple
        label="Удалить"
        icon="pi pi-trash"
        class="p-button-danger"
        (click)="deleteSelectedShiftTypes()"
        [disabled]="!selectedShiftTypes || !selectedShiftTypes.length"
      ></button>
    </div>
  </p-toolbar>

  <!-- Data Table -->
  <p-table
    #dt
    [value]="shiftTypes"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Показано {first} - {last} из {totalRecords} записей"
    [globalFilterFields]="['name', 'code']"
    responsiveLayout="scroll"
    [(selection)]="selectedShiftTypes"
    dataKey="id"
  >
    <ng-template pTemplate="caption">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-semibold">Типы смен</h3>
        <span class="p-input-icon-left">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            #searchInput
            placeholder="Поиск..."
            (input)="dt.filterGlobal(searchInput.value, 'contains')"
          />
        </span>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th style="width: 3rem">
          <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
        </th>
        <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
        <th pSortableColumn="name">
          Название <p-sortIcon field="name"></p-sortIcon>
        </th>
        <th pSortableColumn="code">
          Код <p-sortIcon field="code"></p-sortIcon>
        </th>
        <th pSortableColumn="isWorkShift">
          Рабочая смена <p-sortIcon field="isWorkShift"></p-sortIcon>
        </th>
        <th>Действия</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-shiftType>
      <tr>
        <td>
          <p-tableCheckbox [value]="shiftType"></p-tableCheckbox>
        </td>
        <td>{{ shiftType.id }}</td>
        <td>{{ shiftType.name }}</td>
        <td>{{ shiftType.code }}</td>
        <td>
          <p-tag
            [value]="shiftType.isWorkShift ? 'Да' : 'Нет'"
            [severity]="shiftType.isWorkShift ? 'success' : 'warning'"
          ></p-tag>
        </td>
        <td>
          <button
            pButton
            pRipple
            icon="pi pi-pencil"
            class="mr-2 p-button-rounded p-button-success"
            (click)="editShiftType(shiftType)"
          ></button>
          <button
            pButton
            pRipple
            icon="pi pi-trash"
            class="p-button-rounded p-button-warning"
            (click)="deleteShiftType(shiftType)"
          ></button>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="summary">
      <div class="flex align-items-center justify-content-between">
        Всего типов смен: {{ shiftTypes ? shiftTypes.length : 0 }}
      </div>
    </ng-template>
  </p-table>

  <!-- Toast for notifications -->
  <p-toast></p-toast>
</div>

<!-- Dialog for creating/editing shift type -->
<p-dialog
  [(visible)]="shiftTypeDialog"
  [style]="{ width: '450px' }"
  header="Тип смены"
  [modal]="true"
  styleClass="p-fluid"
>
  <ng-template pTemplate="content">
    <div class="field">
      <label for="shiftTypeSelect">Выбрать тип смены</label>
      <p-select
        id="shiftTypeSelect"
        [options]="shiftTypes"
        optionLabel="name"
        optionValue="id"
        placeholder="Выберите тип смены"
        class="w-full"
      ></p-select>
    </div>

    <div class="field">
      <label for="name">Название *</label>
      <input
        type="text"
        pInputText
        id="name"
        [(ngModel)]="shiftType.name"
        required
        autofocus
      />
      <small class="p-error" *ngIf="submitted && !shiftType.name"
        >Название обязательно.</small
      >
    </div>

    <div class="field">
      <label for="code">Код *</label>
      <input
        type="text"
        pInputText
        id="code"
        [(ngModel)]="shiftType.code"
        required
      />
      <small class="p-error" *ngIf="submitted && !shiftType.code"
        >Код обязателен.</small
      >
    </div>

    <div class="field-checkbox">
      <p-checkbox
        id="isWorkShift"
        [(ngModel)]="shiftType.isWorkShift"
        binary="true"
      ></p-checkbox>
      <label for="isWorkShift">Рабочая смена</label>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <button
      pButton
      pRipple
      label="Отмена"
      icon="pi pi-times"
      class="p-button-text"
      (click)="hideDialog()"
    ></button>
    <button
      pButton
      pRipple
      label="Сохранить"
      icon="pi pi-check"
      class="p-button-text"
      (click)="saveShiftType()"
    ></button>
  </ng-template>
</p-dialog>

<!-- Confirmation Dialog -->
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
