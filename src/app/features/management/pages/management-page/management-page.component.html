<app-main>
  <!-- Sidebar template -->
  <ng-template #sidebar>
    <div class="p-4">
      <h2 class="mb-6 text-xl font-bold text-gray-800">Управление</h2>
      <nav class="space-y-2">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.routerLink"
          routerLinkActive="bg-blue-100 border-r-4 border-blue-500 text-blue-700"
          class="flex items-center px-3 py-2 text-gray-700 transition-colors duration-200 rounded-lg hover:bg-gray-100"
        >
          <i [class]="item.icon + ' mr-3 text-lg'"></i>
          <span class="font-medium">{{ item.label }}</span>
        </a>
      </nav>
    </div>
  </ng-template>

  <!-- Main content area -->
  <router-outlet></router-outlet>
</app-main>
